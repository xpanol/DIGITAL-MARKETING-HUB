<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MARKETING DIGITAL | XPAÑOL</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Special Elite',cursive;
}

body{
    min-height:100vh;
    background:#7c3aed;
    color:white;
    padding:50px 30px;
    position:relative;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    pointer-events:none;
    z-index:0;
}

#loading{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:24px;
    z-index:9999;
}

.header,
.grid,
.footer{
    position:relative;
    z-index:1;
}

.header{
    text-align:center;
    margin-bottom:70px;
}

.header h1{
    font-size:4rem;
    margin-bottom:15px;
    letter-spacing:2px;
}

.subtitle{
    opacity:.9;
    font-size:1rem;
}

.grid{
    max-width:1200px;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.card{
    background:white;
    color:#111;
    text-decoration:none;

    border-radius:24px;

    min-height:220px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    padding:30px;

    transition:.25s;

    box-shadow:
    0 15px 35px rgba(0,0,0,.18);
}

.card:hover{
    transform:translateY(-6px);

    box-shadow:
    0 25px 45px rgba(0,0,0,.25);
}

.card h3{
    font-size:2rem;
    line-height:1.4;
}

.footer{
    text-align:center;
    margin-top:60px;
}

.logout-btn{
    background:transparent;
    color:white;

    border:2px solid rgba(255,255,255,.7);

    border-radius:14px;

    padding:14px 28px;

    cursor:pointer;

    font-size:1rem;

    transition:.25s;
}

.logout-btn:hover{
    background:white;
    color:#7c3aed;
}

@media(max-width:1100px){

    .grid{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:2.5rem;
    }

}

</style>

</head>

<body>

<div id="loading">
    Checking access...
</div>

<div id="app" style="display:none;">

<div class="header">

    <h1>MARKETING DIGITAL</h1>

    <div class="subtitle">
        ENGLISH + ESPAÑOL • BY XPAÑOL
    </div>

</div>

<div class="grid">

    <a class="card"
       href="https://xpanol.github.io/CUSTOMEE/">

        <h3>FRASEO</h3>

    </a>

    <a class="card" href="#">

        <h3>INMERSIÓN AUDITIVA</h3>

    </a>

    <a class="card" href="#">

        <h3>KEYWORDS</h3>
        href="https://xpanol.github.io/FLASHY/">
    </a>

    <a class="card" href="#">

        <h3>PRO!NUNCIA<br>LIKE A PRO</h3>

    </a>

    <a class="card" href="#">

        <h3>PRO!READ</h3>

    </a>

    <a class="card" href="#">

        <h3>PALABRA<br>RÁPIDA</h3>

    </a>

</div>

<div class="footer">

    <button
        class="logout-btn"
        id="logoutBtn">

        LOGOUT

    </button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
}
from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAGPNktzjNlqXirf4bq-MVYRynW88oiP4",
  authDomain: "fraseo-marketing-digital.firebaseapp.com",
  projectId: "fraseo-marketing-digital",
  storageBucket: "fraseo-marketing-digital.firebasestorage.app",
  messagingSenderId: "238473898395",
  appId: "1:238473898395:web:ec7763b50c31d486d6193e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const loading =
document.getElementById("loading");

const appContainer =
document.getElementById("app");

onAuthStateChanged(auth, (user) => {

    if (!user) {

        window.location.href =
        "https://xpanol.github.io/marketing-portal/";

        return;
    }

    loading.style.display = "none";
    appContainer.style.display = "block";

});

document
.getElementById("logoutBtn")
.addEventListener("click", async () => {

    await signOut(auth);

    window.location.href =
    "https://xpanol.github.io/marketing-portal/";

});

</script>

</body>

</html>
